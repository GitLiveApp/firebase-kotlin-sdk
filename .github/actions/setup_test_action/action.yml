name: 'Setup Tests'
description: 'Prepares to run tests on Firebase emulator'

runs:
  using: "composite"
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: gradle
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: test/functions/package-lock.json
    - name: Upgrade packages
      shell: bash
      run: npm update
    - name: Gradle cache
      uses: gradle/actions/setup-gradle@v4
    - name: Kotlin/Native cache
      uses: actions/cache@v5
      with:
        path: ~/.konan
        key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
        restore-keys: |
          konan-${{ runner.os }}-
    - name: Firebase emulator cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/firebase/emulators
        key: firebase-emulators-${{ runner.os }}-${{ hashFiles('test/firebase.json') }}
        restore-keys: |
          firebase-emulators-${{ runner.os }}-
    - name: Grant execute permission for gradlew
      shell: bash
      run: chmod +x gradlew
    - name: Install Firebase tools
      shell: bash
      run: npm install -g firebase-tools wait-on
    - name: Install test functions dependencies
      shell: bash
      run: npm install --prefix test/functions
    - name: Start Firebase emulator
      shell: bash
      run: |
        firebase emulators:start --config=./test/firebase.json &
        wait-on tcp:127.0.0.1:9099 tcp:127.0.0.1:5001
